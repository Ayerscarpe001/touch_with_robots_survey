<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Social robot with articulated arms and hands</title>
  <desc id="desc">A simple white line drawing of a compact social robot with a round head, upper body, shoulder joints, articulated arms, and hands.</desc>
  <rect width="1280" height="720" fill="#080808"/>

  <g fill="#f4f4f4" stroke="#080808" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head and symmetric side modules -->
    <circle cx="640" cy="176" r="119"/>
    <ellipse cx="528" cy="184" rx="35" ry="58"/>
    <ellipse cx="752" cy="184" rx="35" ry="58"/>

    <!-- Torso -->
    <path d="M518 326c0-20 16-36 36-36h172c20 0 36 16 36 36v238c0 27-22 49-49 49H567c-27 0-49-22-49-49Z"/>
    <path d="M518 384h244" fill="none" stroke-width="6" opacity=".55"/>

    <!-- Shoulder joints -->
    <circle cx="505" cy="357" r="46"/>
    <circle cx="775" cy="357" r="46"/>

    <!-- Left articulated arm, bent toward the front -->
    <path d="M474 382c-28 36-46 73-53 112-5 25 12 49 37 54 25 5 49-12 54-37 5-27 18-54 38-80Z"/>
    <circle cx="457" cy="520" r="36"/>
    <path d="M474 539c18 13 39 25 62 36 22 10 48 0 58-22 10-22 0-48-22-58-17-8-33-17-47-27Z"/>

    <!-- Right articulated arm, bent toward the front -->
    <path d="M806 382c28 36 46 73 53 112 5 25-12 49-37 54-25 5-49-12-54-37-5-27-18-54-38-80Z"/>
    <circle cx="823" cy="520" r="36"/>
    <path d="M806 539c-18 13-39 25-62 36-22 10-48 0-58-22-10-22 0-48 22-58 17-8 33-17 47-27Z"/>

  </g>

  <!-- Hands adapted from the supplied robot-hand artwork -->
  <g transform="translate(507 475) scale(1.35)" fill="#f4f4f4" stroke="#080808" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M78.861 38.908C74.362 62.741 48.207 77.285 33.078 72.079C29.867 71.68 21.084 66.366 11.644 48.313C-.156 25.746 30.23 6.59 46.808 9.121C63.387 11.653 52.545 41.147 62.816 30.215C70.325 22.223 81.085 27.127 78.861 38.908Z"/>
    <path d="M118.279 38.908C122.778 62.741 148.932 77.285 164.062 72.079C167.273 71.68 176.056 66.366 185.496 48.313C197.295 25.746 166.91 6.59 150.331 9.121C133.753 11.653 144.594 41.147 134.323 30.215C126.815 22.223 116.055 27.127 118.279 38.908Z"/>
  </g>

  <!-- Face -->
  <g fill="#080808">
    <circle cx="608" cy="174" r="12"/>
    <circle cx="678" cy="174" r="12"/>
  </g>
  <path d="M613 221c17 10 38 10 55 0" fill="none" stroke="#080808" stroke-width="8" stroke-linecap="round"/>

  <!-- Restrained blue construction accent -->
  <g fill="none" stroke="#5b9bff" stroke-width="6" stroke-linecap="round">
    <path d="M583 327h114"/>
  </g>

  <!-- Finger divisions from the supplied robot-hand artwork -->
  <g transform="translate(507 475) scale(1.35)" fill="none" stroke="#080808" stroke-width="3.8" stroke-linecap="round">
    <path d="M20.177 29.964 28.82 41.389M29.944 23.681 37.265 35.995M41.343 18.559 46.871 31.776"/>
    <path d="M176.963 29.964 168.319 41.389M167.196 23.681 159.875 35.995M155.796 18.559 150.269 31.776"/>
  </g>
</svg>
