<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Touch Intro Animation Prototype v16</title>
<style>
  :root {
    --bg: #080808;
    --line: #f2f2f2;
    --soft: #cfcfcf;
    --muted: #888;
    --fill: #111;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
    color: var(--line);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .frame {
    width: min(960px, 100vw);
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background:
      radial-gradient(circle at 64% 73%, rgba(255,255,255,0.045), transparent 30%),
      #080808;
  }

  svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .line {
    fill: none;
    stroke: var(--line);
    stroke-width: 5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .thin { stroke-width: 3.2; }
  .muted { stroke: var(--muted); }
  .body-fill { fill: var(--fill); stroke: var(--line); stroke-width: 5; }
  .soft-fill { fill: var(--fill); stroke: var(--soft); stroke-width: 4; }
  .shadow { fill: rgba(255,255,255,0.075); }

  #scene {
    transform-box: fill-box;
    transform-origin: 66% 70%;
  }

  #robot {
    transform-box: fill-box;
    transform-origin: center bottom;
  }

  #robotArm {
    opacity: 1;
  }

  #robotUpperArm,
  #robotForearm {
    stroke-width: 5;
  }

  #touchHalo,
  #touchPoint,
  #touchBrackets,
  #humanSmile {
    opacity: 0;
  }

  #humanNeutral {
    opacity: 1;
  }

  @media (prefers-reduced-motion: reduce) {
    #touchHalo,
    #touchPoint,
    #touchBrackets,
    #humanSmile {
      opacity: 1;
    }
    #humanNeutral { opacity: 0; }
  }
</style>
</head>
<body>
<main class="frame" aria-label="A simple animation showing a humanoid robot moving close and touching a person's hand.">
  <svg viewBox="0 0 960 540" role="img" aria-hidden="true">
    <g id="scene">
      <ellipse class="shadow" cx="504" cy="438" rx="260" ry="22"/>
      <path class="line thin muted" d="M116 441 C250 420, 410 420, 540 438 C660 455, 780 450, 844 433"/>

      <g id="human" transform="translate(610 85)">
        <circle class="body-fill" cx="104" cy="68" r="46"/>
        <path class="line thin muted" d="M78 47 C84 42, 94 42, 100 47"/>
        <path class="line thin muted" d="M114 47 C120 42, 130 42, 136 47"/>
        <path id="humanNeutral" class="line thin" d="M94 82 L118 82"/>
        <path id="humanSmile" class="line thin" d="M92 76 C100 87, 113 87, 121 76"/>
        <path class="body-fill" d="M56 132 C48 190, 47 276, 64 350 C74 394, 135 394, 146 350 C164 276, 164 190, 154 132 C132 119, 80 119, 56 132Z"/>
        <path id="humanArmRestGuide" class="line muted" d="M69 154 C53 202, 54 245, 62 283"/>
        <path class="line" d="M148 154 C184 208, 187 268, 158 306"/>
        <path class="line" d="M82 366 C72 401, 67 430, 58 458"/>
        <path class="line" d="M126 366 C139 402, 147 430, 156 458"/>
        <g id="humanHand">
          <path id="humanHandArm" class="line" d="M68 154 C42 190, 32 236, 36 280"/>
          <circle id="humanHandCircle" class="soft-fill" cx="36" cy="280" r="14"/>
        </g>
      </g>

      <g id="robot">
        <rect class="body-fill" x="70" y="115" width="112" height="130" rx="34"/>
        <rect class="body-fill" x="82" y="25" width="88" height="78" rx="15"/>
        <path class="line thin muted" d="M126 25 L126 -4"/>
        <circle class="soft-fill" cx="126" cy="-10" r="7"/>
        <circle class="soft-fill" cx="105" cy="56" r="6"/>
        <circle class="soft-fill" cx="147" cy="56" r="6"/>
        <path class="line thin" d="M111 75 C120 81, 133 81, 141 75"/>

        <g id="robotLeftArm">
          <path class="line" d="M83 157 C75 164, 65 182, 64 200"/>
          <line class="line" x1="64" y1="200" x2="64" y2="250"/>
          <circle class="soft-fill" cx="64" cy="200" r="6"/>
          <circle class="soft-fill" cx="64" cy="250" r="11"/>
        </g>
        <g id="robotArm">
          <path id="robotUpperArm" class="line" d="M174 155 C184 164, 195 182, 196 200"/>
          <line id="robotForearm" class="line" x1="196" y1="200" x2="194" y2="250"/>
          <circle id="robotElbow" class="soft-fill" cx="196" cy="200" r="6"/>
          <g id="robotHand">
            <circle id="robotPalm" class="soft-fill" cx="194" cy="250" r="12"/>
          </g>
        </g>

        <path class="line" d="M103 245 L90 315"/>
        <path class="line" d="M149 245 L162 315"/>
        <g transform="translate(84 315)">
          <circle class="soft-fill" cx="0" cy="0" r="18"/>
          <path id="leftWheelMark" class="line thin" d="M-10 0 L10 0 M0 -10 L0 10"/>
        </g>
        <g transform="translate(168 315)">
          <circle class="soft-fill" cx="0" cy="0" r="18"/>
          <path id="rightWheelMark" class="line thin" d="M-10 0 L10 0 M0 -10 L0 10"/>
        </g>
      </g>

      <g id="touchBrackets">
        <path class="line thin" d="M614 354 C632 336, 662 336, 684 354"/>
        <path class="line thin" d="M614 382 C636 401, 666 400, 688 382"/>
      </g>
      <circle id="touchHalo" cx="646" cy="365" r="25" fill="none" stroke="var(--line)" stroke-width="3"/>
      <circle id="touchPoint" cx="646" cy="365" r="5.5" fill="var(--line)"/>
    </g>
  </svg>
</main>

<script>
(() => {
  const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const svg = {
    scene: document.getElementById("scene"),
    robot: document.getElementById("robot"),
    upper: document.getElementById("robotUpperArm"),
    forearm: document.getElementById("robotForearm"),
    elbow: document.getElementById("robotElbow"),
    palm: document.getElementById("robotPalm"),
    wheelLeft: document.getElementById("leftWheelMark"),
    wheelRight: document.getElementById("rightWheelMark"),
    humanHand: document.getElementById("humanHand"),
    humanHandArm: document.getElementById("humanHandArm"),
    humanHandCircle: document.getElementById("humanHandCircle"),
    humanArmRestGuide: document.getElementById("humanArmRestGuide"),
    neutral: document.getElementById("humanNeutral"),
    smile: document.getElementById("humanSmile"),
    halo: document.getElementById("touchHalo"),
    point: document.getElementById("touchPoint"),
    brackets: document.getElementById("touchBrackets")
  };

  const duration = 7000;
  const robotY = 122;
  const robotStartX = 245;
  const robotEndX = 432;
  const shoulder = { x: 174, y: 155 };
  const restHand = { x: 194, y: 250 };
  const touchWorld = { x: 646, y: 365 };
  const upperArmLength = 50;
  const forearmLength = 50;
  const humanArmRest = {
    start: { x: 69, y: 154 },
    control1: { x: 53, y: 202 },
    control2: { x: 54, y: 245 },
    hand: { x: 62, y: 283 }
  };
  const humanArmReady = {
    start: { x: 68, y: 154 },
    control1: { x: 42, y: 190 },
    control2: { x: 32, y: 236 },
    hand: { x: 36, y: 280 }
  };

  const clamp = (value, min = 0, max = 1) => Math.min(max, Math.max(min, value));
  const smooth = value => {
    const t = clamp(value);
    return t * t * (3 - 2 * t);
  };
  const mix = (a, b, t) => a + (b - a) * t;

  function segment(progress, start, end) {
    return smooth((progress - start) / (end - start));
  }

  function setLine(line, a, b) {
    line.setAttribute("x1", a.x.toFixed(2));
    line.setAttribute("y1", a.y.toFixed(2));
    line.setAttribute("x2", b.x.toFixed(2));
    line.setAttribute("y2", b.y.toFixed(2));
  }

  function setUpperArmPath(path, elbow) {
    const c1 = {
      x: mix(shoulder.x, elbow.x, 0.38),
      y: shoulder.y + 9
    };
    const c2 = {
      x: mix(shoulder.x, elbow.x, 0.88),
      y: elbow.y - 18
    };
    path.setAttribute(
      "d",
      `M${shoulder.x} ${shoulder.y} C${c1.x.toFixed(2)} ${c1.y.toFixed(2)}, ${c2.x.toFixed(2)} ${c2.y.toFixed(2)}, ${elbow.x.toFixed(2)} ${elbow.y.toFixed(2)}`
    );
  }

  function setCircle(circle, point) {
    circle.setAttribute("cx", point.x.toFixed(2));
    circle.setAttribute("cy", point.y.toFixed(2));
  }

  function setHand(point) {
    setCircle(svg.palm, point);
  }

  function mixPoint(a, b, t) {
    return {
      x: mix(a.x, b.x, t),
      y: mix(a.y, b.y, t)
    };
  }

  function setHumanArm(phase) {
    const start = mixPoint(humanArmRest.start, humanArmReady.start, phase);
    const control1 = mixPoint(humanArmRest.control1, humanArmReady.control1, phase);
    const control2 = mixPoint(humanArmRest.control2, humanArmReady.control2, phase);
    const hand = mixPoint(humanArmRest.hand, humanArmReady.hand, phase);
    svg.humanHandArm.setAttribute(
      "d",
      `M${start.x.toFixed(2)} ${start.y.toFixed(2)} C${control1.x.toFixed(2)} ${control1.y.toFixed(2)}, ${control2.x.toFixed(2)} ${control2.y.toFixed(2)}, ${hand.x.toFixed(2)} ${hand.y.toFixed(2)}`
    );
    setCircle(svg.humanHandCircle, hand);
    svg.humanArmRestGuide.style.opacity = (0.32 * (1 - phase)).toFixed(3);
  }

  function solveElbow(base, hand) {
    const dx = hand.x - base.x;
    const dy = hand.y - base.y;
    const rawDistance = Math.hypot(dx, dy);
    const distance = clamp(
      rawDistance,
      Math.abs(upperArmLength - forearmLength) + 0.01,
      upperArmLength + forearmLength - 0.01
    );
    const ux = dx / rawDistance;
    const uy = dy / rawDistance;
    const along = (
      upperArmLength * upperArmLength -
      forearmLength * forearmLength +
      distance * distance
    ) / (2 * distance);
    const height = Math.sqrt(Math.max(0, upperArmLength * upperArmLength - along * along));

    return {
      x: base.x + ux * along + uy * height,
      y: base.y + uy * along - ux * height
    };
  }

  function render(progress) {
    const approach = segment(progress, 0.06, 0.30);
    const humanPrepare = segment(progress, 0.18, 0.36);
    const reach = segment(progress, 0.36, 0.54);
    const release = segment(progress, 0.86, 0.98);
    const contact = segment(progress, 0.52, 0.60) * (1 - segment(progress, 0.84, 0.94));
    const smile = segment(progress, 0.66, 0.78);

    const robotX = mix(robotStartX, robotEndX, approach);
    const camera = segment(progress, 0.28, 0.52);
    const wheelAngle = 360 * approach;

    svg.robot.setAttribute("transform", `translate(${robotX.toFixed(2)} ${robotY})`);
    svg.scene.setAttribute(
      "transform",
      `translate(${mix(0, -34, camera).toFixed(2)} ${mix(0, -18, camera).toFixed(2)}) scale(${mix(1, 1.12, camera).toFixed(3)})`
    );
    svg.wheelLeft.setAttribute("transform", `rotate(${wheelAngle.toFixed(2)})`);
    svg.wheelRight.setAttribute("transform", `rotate(${wheelAngle.toFixed(2)})`);

    const finalHand = {
      x: touchWorld.x - robotX,
      y: touchWorld.y - robotY
    };
    const hand = {
      x: mix(restHand.x, finalHand.x, reach),
      y: mix(restHand.y, finalHand.y, reach)
    };
    const elbow = solveElbow(shoulder, hand);

    setHumanArm(humanPrepare);
    setUpperArmPath(svg.upper, elbow);
    setLine(svg.forearm, elbow, hand);
    setCircle(svg.elbow, elbow);
    setHand(hand);

    const handNudge = 1.2 * contact;
    svg.humanHand.setAttribute("transform", `translate(${-handNudge.toFixed(2)} 0)`);
    svg.neutral.style.opacity = (1 - smile).toFixed(3);
    svg.smile.style.opacity = smile.toFixed(3);

    const haloPulse = 0.65 + 0.5 * Math.sin(progress * Math.PI * 8);
    svg.halo.style.opacity = (0.42 * contact).toFixed(3);
    svg.halo.setAttribute("r", (23 + 9 * haloPulse * contact).toFixed(2));
    svg.point.style.opacity = (0.92 * contact).toFixed(3);
    svg.brackets.style.opacity = (0.18 * contact).toFixed(3);

    if (release > 0) {
      svg.halo.style.opacity = (0.42 * contact * (1 - release)).toFixed(3);
      svg.point.style.opacity = (0.92 * contact * (1 - release)).toFixed(3);
      svg.brackets.style.opacity = (0.18 * contact * (1 - release)).toFixed(3);
    }
  }

  if (prefersReduced) {
    render(0.68);
    return;
  }

  window.__renderProgress = render;
  render(0);

  let start = performance.now();
  function tick(now) {
    const progress = ((now - start) % duration) / duration;
    render(progress);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
